services:
  db-test:
    image: mysql:8.0
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: barberdb_test
      MYSQL_USER: barber_user
      MYSQL_PASSWORD: barber_pass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      timeout: 30s
      interval: 10s
      retries: 10
